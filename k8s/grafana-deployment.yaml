apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: hotel-booking
  labels:
    app: grafana

spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  strategy:
    type: Recreate

  template:
    metadata:
      labels:
        app: grafana

    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsGroup: 472

      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: GF_SECURITY_ADMIN_USER

            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: GF_SECURITY_ADMIN_PASSWORD

            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana/"

            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 60
            periodSeconds: 5
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana

      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc
            