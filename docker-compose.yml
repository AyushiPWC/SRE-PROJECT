services:

  database:
    image: postgres:16-alpine
    container_name: hotel-booking-database

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sre123
      POSTGRES_DB: hotel_booking

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5433:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d hotel_booking"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    image: hotel-booking-backend:v2
    container_name: hotel-booking-backend

    env_file:
      - ./backend/.env

    environment:
      DATABASE_URL: postgresql://postgres:sre123@database:5432/hotel_booking

    ports:
      - "8000:8000"

    depends_on:
      database:
        condition: service_healthy

    restart: unless-stopped


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    image: hotel-booking-frontend:v1
    container_name: hotel-booking-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    restart: unless-stopped


  prometheus:
    image: prom/prometheus:latest
    container_name: hotel-booking-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    depends_on:
      - backend

    restart: unless-stopped


  grafana:
    image: grafana/grafana:latest
    container_name: hotel-booking-grafana

    ports:
      - "3001:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    
    # SMTP Configuration
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: smtp.gmail.com:587
      GF_SMTP_USER: ${GRAFANA_SMTP_USER}
      GF_SMTP_PASSWORD: ${GRAFANA_SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_SMTP_USER}
      GF_SMTP_FROM_NAME: Hotel Booking Grafana
      GF_SMTP_SKIP_VERIFY: "true"


    volumes:
      - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus

    restart: unless-stopped


volumes:
  postgres_data:
  grafana_data: