name: CD Pipeline

on:
  workflow_run:
    workflows: ["Hotel Booking CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Cluster
        shell: pwsh
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Deploy to Kubernetes
        shell: pwsh
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/prometheus-config.yaml
          kubectl apply -f k8s/prometheus-deployment.yaml
          kubectl apply -f k8s/grafana-deployment.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Restart Deployments
        shell: pwsh
        run: |
          kubectl rollout restart deployment/backend -n hotel-booking
          kubectl rollout restart deployment/frontend -n hotel-booking
          kubectl rollout restart deployment/prometheus -n hotel-booking
          kubectl rollout restart deployment/grafana -n hotel-booking

      - name: Wait for Rollout
        shell: pwsh
        run: |
          kubectl rollout status deployment/backend -n hotel-booking --timeout=180s
          kubectl rollout status deployment/frontend -n hotel-booking --timeout=180s
          kubectl rollout status deployment/prometheus -n hotel-booking --timeout=180s
          kubectl rollout status deployment/grafana -n hotel-booking --timeout=180s
