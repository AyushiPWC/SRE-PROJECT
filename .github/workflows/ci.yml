name: Hotel Booking CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        working-directory: backend
        run: python -m compileall app


  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build


  docker-build-and-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest

    needs:
      - backend-check
      - frontend-check

    # Do not publish Docker images from pull-request runs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Validate Docker Compose
        env:
          GRAFANA_SMTP_USER: test@example.com
          GRAFANA_SMTP_PASSWORD: testpassword1234
        run: docker compose config --quiet

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hotel-booking-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hotel-booking-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hotel-booking-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hotel-booking-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max